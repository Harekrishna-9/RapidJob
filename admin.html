<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Rapid Job Admin</title><link rel="stylesheet" href="style.css"><script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script><script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script><script defer src="admin.js"></script></head><body><header class="top"><div class="brand"><div class="logo">⚡</div><div><h1>Rapid Job Admin</h1><p>Fast Government Job Updates</p></div></div><a class="btn" href="index.html">Website</a></header><main class="admin"><section id="loginBox" class="card"><h2>Admin Login</h2><input id="email" placeholder="Email"><input id="password" type="password" placeholder="Password"><button onclick="loginAdmin()">Login</button><p id="msg"></p></section><section id="adminPanel" class="hide"><div class="adminTop"><h2>Dashboard</h2><button onclick="logoutAdmin()">Logout</button></div><div class="tabs"><button onclick="showForm('job')">Latest Job</button><button onclick="showForm('admit')">Admit Card</button><button onclick="showForm('result')">Result</button><button onclick="showForm('answer')">Answer Key</button><button onclick="showForm('syllabus')">Syllabus</button><button onclick="showForm('admission')">Admission</button><button onclick="showForm('scholarship')">Scholarship</button><button onclick="generateSitemap()">Sitemap</button></div><section class="card"><h2 id="formTitle">Add Update</h2><input id="title" placeholder="Title"><select id="type"><option value="job">Latest Job</option><option value="admit">Admit Card</option><option value="result">Result</option><option value="answer">Answer Key</option><option value="syllabus">Syllabus</option><option value="admission">Admission</option><option value="scholarship">Scholarship</option></select><input id="state" placeholder="State / Central"><input id="lastDate" placeholder="Last Date / Exam Date"><input id="applyLink" placeholder="Apply / Official Link"><input id="pdfLink" placeholder="Notification PDF Link"><textarea id="details" placeholder="Eligibility, age limit, fee, selection process..."></textarea><label><input type="checkbox" id="isTrending"> Trending</label><button onclick="savePost()">Save Update</button></section><section class="card"><h2>All Updates</h2><div id="adminPosts"></div></section></section></main></body></html>
