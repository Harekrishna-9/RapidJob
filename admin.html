<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rapid Job Admin Pro</title>
  <link rel="stylesheet" href="admin.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="bg-orbs"><span></span><span></span><span></span></div>

  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-icon">⚡</div>
      <div><h2>Rapid Job</h2><p>Admin Pro</p></div>
    </div>

    <button class="new-post" id="quickPostBtn">＋ New Post</button>

    <nav id="sideNav">
      <button class="active" data-view="dashboard">▦ Dashboard</button>
      <button data-view="content">▣ Content Manager <b>Pro</b></button>
      <button data-view="manager">🧩 Manager <b>New</b></button>
      <button data-view="notifications">🔔 Notifications <span id="sideNotifyCount">8</span></button>
      <button data-view="users">👥 Users</button>
      <button data-view="messages">💬 Messages <span id="msgCount">5</span></button>
      <button data-view="media">🖼 Media Manager</button>
      <button data-view="reports">📊 Reports</button>
      <button data-view="settings">⚙ Settings</button>
    </nav>

    <a class="open-web" href="index.html">🌍 Open Website ↗</a>
  </aside>

  <main class="main">
    <header class="topbar">
      <button class="menu" id="menuBtn">☰</button>
      <div class="search"><span>⌕</span><input id="searchInput" type="search" placeholder="Search posts, users, jobs... Ctrl+K"></div>
      <button class="icon-btn" id="notifyBtn">🔔<i id="topNotifyCount">8</i></button>
      <button class="icon-btn" id="messageBtn">💬<i id="topMsgCount">5</i></button>
      <button class="icon-btn" id="themeBtn">☀</button>
      <div class="profile"><div class="avatar">HP</div><div><b>Harekrishna Patel</b><small>Super Admin</small></div></div>
    </header>

    <section id="content"></section>

    <footer class="status-bar">
      <div>🟢 Website <b>Online</b></div>
      <div>🔥 Firebase <b>Ready</b></div>
      <div>💽 Storage <b>Local Demo</b></div>
      <div>💼 Backup <b>Manual</b></div>
      <button id="backupBtn">Create Backup Now</button>
    </footer>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
  <script src="admin.js"></script>
</body>
</html>
