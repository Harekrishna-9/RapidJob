<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Age Calculator | Rapid Job</title><link rel="icon" href="favicon-32.png"><link rel="stylesheet" href="common.css">
<style>
/* Rapid Job Age Calculator — animated enhancement */
:root{
  --rj-blue:#087cf0;
  --rj-cyan:#23c3e6;
  --rj-deep:#075bd8;
  --rj-white:#ffffff;
}
body{
  overflow-x:hidden;
  background:
    radial-gradient(circle at 10% 10%, rgba(35,195,230,.16), transparent 28%),
    radial-gradient(circle at 90% 20%, rgba(8,124,240,.14), transparent 30%),
    linear-gradient(135deg,#f7fbff,#eef7ff 45%,#f9fcff);
  background-size:140% 140%;
  animation:rjPageBg 12s ease-in-out infinite alternate;
}
@keyframes rjPageBg{
  0%{background-position:0% 0%}
  100%{background-position:100% 100%}
}
.page{position:relative;isolation:isolate}
.page::before,
.page::after{
  content:"";
  position:fixed;
  width:260px;height:260px;
  border-radius:50%;
  filter:blur(12px);
  opacity:.22;
  z-index:-1;
  animation:rjFloat 8s ease-in-out infinite;
}
.page::before{
  top:18%;left:-100px;
  background:linear-gradient(135deg,var(--rj-blue),var(--rj-cyan));
}
.page::after{
  right:-110px;bottom:8%;
  background:linear-gradient(135deg,#6f5cff,var(--rj-cyan));
  animation-delay:-4s;
}
@keyframes rjFloat{
  0%,100%{transform:translateY(0) scale(1)}
  50%{transform:translateY(-22px) scale(1.07)}
}
.head{
  position:relative;
  overflow:hidden;
  background:linear-gradient(110deg,var(--rj-deep),var(--rj-blue),var(--rj-cyan));
  background-size:220% 220%;
  animation:rjHeaderFlow 7s ease infinite;
}
.head::after{
  content:"";
  position:absolute;
  inset:-40% auto -40% -35%;
  width:36%;
  transform:skewX(-22deg);
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.28),transparent);
  animation:rjShine 4.8s linear infinite;
  pointer-events:none;
}
@keyframes rjHeaderFlow{
  0%,100%{background-position:0% 50%}
  50%{background-position:100% 50%}
}
@keyframes rjShine{
  0%{left:-45%}
  100%{left:125%}
}
.logo{
  box-shadow:0 0 0 5px rgba(255,255,255,.18),0 10px 30px rgba(0,0,0,.16);
  animation:rjLogoPulse 2.8s ease-in-out infinite;
}
@keyframes rjLogoPulse{
  0%,100%{transform:scale(1);filter:drop-shadow(0 0 0 rgba(255,255,255,0))}
  50%{transform:scale(1.045);filter:drop-shadow(0 0 10px rgba(255,255,255,.48))}
}
.nav{
  animation:rjDrop .7s ease both;
  backdrop-filter:blur(12px);
}
.nav a{
  position:relative;
  transition:transform .25s ease, box-shadow .25s ease, color .25s ease, background .25s ease;
}
.nav a:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 22px rgba(7,91,216,.16);
}
.main{animation:rjFadeUp .75s ease both}
@keyframes rjDrop{
  from{opacity:0;transform:translateY(-14px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes rjFadeUp{
  from{opacity:0;transform:translateY(22px)}
  to{opacity:1;transform:translateY(0)}
}
.hero{
  position:relative;
  overflow:hidden;
  background:linear-gradient(120deg,var(--rj-deep),var(--rj-blue),var(--rj-cyan));
  background-size:200% 200%;
  animation:rjHeaderFlow 8s ease infinite, rjHeroIn .8s ease both;
  box-shadow:0 18px 45px rgba(7,91,216,.18);
}
.hero::before{
  content:"";
  position:absolute;
  width:220px;height:220px;
  border-radius:50%;
  right:-70px;top:-90px;
  background:rgba(255,255,255,.16);
  animation:rjOrbit 7s ease-in-out infinite;
}
.hero::after{
  content:"";
  position:absolute;
  inset:auto auto -95px -65px;
  width:190px;height:190px;
  border-radius:50%;
  border:26px solid rgba(255,255,255,.08);
  animation:rjOrbit 9s ease-in-out infinite reverse;
}
@keyframes rjHeroIn{
  from{opacity:0;transform:scale(.97)}
  to{opacity:1;transform:scale(1)}
}
@keyframes rjOrbit{
  0%,100%{transform:translate(0,0) rotate(0deg)}
  50%{transform:translate(-18px,18px) rotate(180deg)}
}
.card{
  position:relative;
  overflow:hidden;
  border:1px solid rgba(8,124,240,.22);
  box-shadow:0 18px 45px rgba(20,77,130,.12);
  transition:transform .3s ease,box-shadow .3s ease;
  animation:rjCardIn .85s .12s ease both;
}
.card:hover{
  transform:translateY(-5px);
  box-shadow:0 24px 60px rgba(7,91,216,.18);
}
.card::before{
  content:"";
  position:absolute;
  top:0;left:-120%;
  width:55%;height:3px;
  background:linear-gradient(90deg,transparent,var(--rj-blue),var(--rj-cyan),transparent);
  animation:rjBorderSweep 3.8s linear infinite;
}
@keyframes rjCardIn{
  from{opacity:0;transform:translateY(24px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes rjBorderSweep{
  to{left:160%}
}
input{
  transition:border-color .25s ease, box-shadow .25s ease, transform .25s ease;
}
input:focus{
  border-color:var(--rj-blue)!important;
  box-shadow:0 0 0 4px rgba(8,124,240,.12)!important;
  transform:translateY(-1px);
}
button{
  position:relative;
  overflow:hidden;
  transition:transform .2s ease,box-shadow .2s ease,filter .2s ease;
}
button:hover{
  transform:translateY(-3px) scale(1.015);
  box-shadow:0 12px 26px rgba(7,91,216,.22);
  filter:saturate(1.1);
}
button:active{transform:scale(.98)}
.result{
  animation:rjResultGlow 2.8s ease-in-out infinite;
}
@keyframes rjResultGlow{
  0%,100%{box-shadow:0 0 0 rgba(8,124,240,0)}
  50%{box-shadow:0 0 22px rgba(8,124,240,.12)}
}
.rj-datetime{
  display:flex;
  align-items:center;
  gap:12px;
  margin-left:auto;
  padding:10px 16px;
  border:1px solid rgba(255,255,255,.35);
  border-radius:999px;
  background:rgba(0,91,190,.34);
  color:#fff;
  font-weight:700;
  box-shadow:0 10px 24px rgba(0,0,0,.12);
  backdrop-filter:blur(12px);
  white-space:nowrap;
  animation:rjDatePulse 3s ease-in-out infinite;
}
.rj-datetime span{display:flex;align-items:center;gap:6px}
@keyframes rjDatePulse{
  0%,100%{box-shadow:0 10px 24px rgba(0,0,0,.12)}
  50%{box-shadow:0 10px 30px rgba(255,255,255,.18)}
}
@media(max-width:760px){
  .head{padding-bottom:14px}
  .brand{flex-wrap:wrap}
  .rj-datetime{
    width:100%;
    justify-content:center;
    margin:12px 0 0;
    border-radius:18px;
    font-size:13px;
  }
}
</style>
</head><body><div class="page"><header class="head"><div class="brand"><div class="logo">RJ</div><div><h1>Rapid Job</h1><p>⚡ Fast Government Job Updates!</p></div><div class="rj-datetime" aria-label="Current date and time"><span>📅 <b id="rjDate">--</b></span><span>🕒 <b id="rjTime">--</b></span></div></div></header><nav class="nav"><a class="" href="index.html">Home</a><a class="" href="index.html#current">Current Job</a><a class="" href="index.html#admit">Admit Card</a><a class="" href="index.html#result">Result</a><a class="" href="index.html#admission">Admission</a><a class="active" href="tools.html">Tools</a><a class="" href="contact.html">Contact Us</a></nav><main class="main"><section class="hero"><h2>Age Calculator</h2><p>Calculate exact age in years, months and days.</p></section><section class="wrap"><div class="card"><h3>Calculate Your Age</h3><div class="grid2"><label>Date of Birth<input type="date" id="dob"></label><label>Calculate On<input type="date" id="on"></label></div><div class="btns"><button onclick="calc()">Calculate Age</button><button class="purple" onclick="elig()">Check 18–35 Eligibility</button></div><div class="result" id="out">Enter your date of birth.</div></div></section></main><footer class="footer"><img src="rapid-job-logo-horizontal.png" alt="Rapid Job"><p>Fast Government Job Updates</p><p>© 2022 - 2026 Rapid Job</p></footer></div><script src="common.js"></script><script>on.valueAsDate=new Date();function age(){let a=new Date(dob.value),b=new Date(on.value);if(!dob.value||!on.value||a>b)return null;let y=b.getFullYear()-a.getFullYear(),m=b.getMonth()-a.getMonth(),d=b.getDate()-a.getDate();if(d<0){m--;d+=new Date(b.getFullYear(),b.getMonth(),0).getDate()}if(m<0){y--;m+=12}return{y,m,d}}function calc(){let x=age();out.innerHTML=x?`<b>${x.y} years, ${x.m} months, ${x.d} days</b>`:'Enter valid dates.'}function elig(){let x=age();out.innerHTML=x?(x.y>=18&&x.y<=35?'✅ Eligible for 18–35 age range.':'❌ Not in 18–35 age range.'):'Enter valid dates.'}</script>
<script>
(function(){
  const dateEl=document.getElementById('rjDate');
  const timeEl=document.getElementById('rjTime');
  function updateRapidJobClock(){
    const now=new Date();
    if(dateEl){
      dateEl.textContent=new Intl.DateTimeFormat('en-IN',{
        weekday:'long',day:'2-digit',month:'long',year:'numeric'
      }).format(now);
    }
    if(timeEl){
      timeEl.textContent=new Intl.DateTimeFormat('en-IN',{
        hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true
      }).format(now);
    }
  }
  updateRapidJobClock();
  setInterval(updateRapidJobClock,1000);
})();
</script>
</body></html>
