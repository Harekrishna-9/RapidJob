<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Age Calculator - Rapid Job</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Inter,Arial,sans-serif}body{min-height:100vh;display:grid;place-items:center;padding:22px;background:linear-gradient(135deg,#fff,#fbf4ff 45%,#eef7ff);color:#171827}body:before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(124,77,255,.055) 1px,transparent 1px),linear-gradient(90deg,rgba(124,77,255,.055) 1px,transparent 1px);background-size:38px 38px}.box{position:relative;width:min(850px,100%);background:rgba(255,255,255,.82);border:1px solid #ebe7ff;border-radius:32px;padding:30px;box-shadow:0 30px 90px rgba(124,77,255,.18);backdrop-filter:blur(18px);overflow:hidden}.box:before{content:"";position:absolute;width:260px;height:260px;border-radius:50%;background:#e7c7ff;filter:blur(45px);right:-60px;top:-80px;opacity:.8}.box>*{position:relative}.tag{display:inline-block;background:#f1e8ff;color:#7c4dff;padding:8px 14px;border-radius:999px;font-weight:900}h1{font-size:42px;margin:14px 0 8px}p{color:#69728a;font-size:18px;margin-bottom:22px}.form{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}input{flex:1;min-width:240px;padding:16px;border-radius:16px;border:1px solid #ded6ff;font-size:16px;font-weight:800;outline:none}input:focus{border-color:#8b5cf6;box-shadow:0 0 0 5px rgba(139,92,246,.12)}button{border:0;border-radius:16px;padding:16px 22px;background:linear-gradient(135deg,#c13dff,#7c4dff);color:#fff;font-weight:900;cursor:pointer;box-shadow:0 18px 40px rgba(124,77,255,.25);transition:.25s}button:hover{transform:translateY(-3px)}.result{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}.pill{min-height:135px;border-radius:24px;background:linear-gradient(135deg,#f8f3ff,#eef7ff);border:1px solid #ebe7ff;display:grid;place-items:center;text-align:center;animation:float 3s infinite}.pill:nth-child(2){animation-delay:.3s}.pill:nth-child(3){animation-delay:.6s}.pill b{display:block;font-size:44px;color:#7c4dff}.pill span{font-weight:900;color:#69728a}@keyframes float{50%{transform:translateY(-8px)}}@media(max-width:700px){h1{font-size:32px}.result{grid-template-columns:1fr}.form button{width:100%}}
</style>
</head>
<body>
<div class="box"><span class="tag">Rapid Job Tool</span><h1>Age Calculator</h1><p>Apni date of birth select karke exact age calculate karein.</p><div class="form"><input id="dob" type="date"><button onclick="calculateAge()">Calculate Age</button></div><div id="result" class="result"><div class="pill"><div><b>0</b><span>Years</span></div></div><div class="pill"><div><b>0</b><span>Months</span></div></div><div class="pill"><div><b>0</b><span>Days</span></div></div></div></div>
<script>
function calculateAge(){const v=document.getElementById('dob').value;if(!v){alert('Please select date of birth');return}const dob=new Date(v),now=new Date();if(dob>now){alert('Future date valid nahi hai');return}let y=now.getFullYear()-dob.getFullYear(),m=now.getMonth()-dob.getMonth(),d=now.getDate()-dob.getDate();if(d<0){m--;d+=new Date(now.getFullYear(),now.getMonth(),0).getDate()}if(m<0){y--;m+=12}document.getElementById('result').innerHTML=`<div class="pill"><div><b>${y}</b><span>Years</span></div></div><div class="pill"><div><b>${m}</b><span>Months</span></div></div><div class="pill"><div><b>${d}</b><span>Days</span></div></div>`}
</script>
</body>
</html>
