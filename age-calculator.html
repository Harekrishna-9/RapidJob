<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Age Calculator | Rapid Job</title><link rel="icon" href="favicon-32.png"><link rel="stylesheet" href="common.css"></head><body><div class="page"><header class="head"><div class="brand"><div class="logo">RJ</div><div><h1>Rapid Job</h1><p>⚡ Fast Government Job Updates!</p></div></div></header><nav class="nav"><a class="" href="index.html">Home</a><a class="" href="index.html#current">Current Job</a><a class="" href="index.html#admit">Admit Card</a><a class="" href="index.html#result">Result</a><a class="" href="index.html#admission">Admission</a><a class="active" href="tools.html">Tools</a><a class="" href="contact.html">Contact Us</a></nav><main class="main"><section class="hero"><h2>Age Calculator</h2><p>Calculate exact age in years, months and days.</p></section><section class="wrap"><div class="card"><h3>Calculate Your Age</h3><div class="grid2"><label>Date of Birth<input type="date" id="dob"></label><label>Calculate On<input type="date" id="on"></label></div><div class="btns"><button onclick="calc()">Calculate Age</button><button class="purple" onclick="elig()">Check 18–35 Eligibility</button></div><div class="result" id="out">Enter your date of birth.</div></div></section></main><footer class="footer"><img src="rapid-job-logo-horizontal.png" alt="Rapid Job"><p>Fast Government Job Updates</p><p>© 2022 - 2026 Rapid Job</p></footer></div><script src="common.js"></script><script>on.valueAsDate=new Date();function age(){let a=new Date(dob.value),b=new Date(on.value);if(!dob.value||!on.value||a>b)return null;let y=b.getFullYear()-a.getFullYear(),m=b.getMonth()-a.getMonth(),d=b.getDate()-a.getDate();if(d<0){m--;d+=new Date(b.getFullYear(),b.getMonth(),0).getDate()}if(m<0){y--;m+=12}return{y,m,d}}function calc(){let x=age();out.innerHTML=x?`<b>${x.y} years, ${x.m} months, ${x.d} days</b>`:'Enter valid dates.'}function elig(){let x=age();out.innerHTML=x?(x.y>=18&&x.y<=35?'✅ Eligible for 18–35 age range.':'❌ Not in 18–35 age range.'):'Enter valid dates.'}</script></body></html>
