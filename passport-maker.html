<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Passport Size Photo Maker | Rapid Job</title><link rel="icon" href="favicon-32.png"><link rel="stylesheet" href="common.css"></head><body><div class="page"><header class="head"><div class="brand"><div class="logo">RJ</div><div><h1>Rapid Job</h1><p>⚡ Fast Government Job Updates!</p></div></div></header><nav class="nav"><a class="" href="index.html">Home</a><a class="" href="index.html#current">Current Job</a><a class="" href="index.html#admit">Admit Card</a><a class="" href="index.html#result">Result</a><a class="" href="index.html#admission">Admission</a><a class="active" href="tools.html">Tools</a><a class="" href="contact.html">Contact Us</a></nav><main class="main"><section class="hero"><h2>Passport Size Photo Maker</h2><p>Crop, resize and download passport photos or A4 sheets.</p></section><section class="wrap"><div class="card"><div class="grid2"><div><label>Choose Photo<input type="file" id="pfile" accept="image/*"></label><label style="margin-top:15px">Size<select id="preset"><option value="413x531">Passport 35×45 mm</option><option value="602x602">India Passport 51×51 mm</option><option value="295x413">Aadhaar/PAN 25×35 mm</option></select></label><label style="margin-top:15px">Background<select id="bg"><option value="#fff">White</option><option value="#e6f4ff">Light Blue</option><option value="#2563eb">Blue</option></select></label><div class="btns"><button onclick="zoom(.08)">Zoom +</button><button class="purple" onclick="zoom(-.08)">Zoom -</button><button class="orange" onclick="resetP()">Reset</button><button class="green" onclick="downP()">Download HD</button><button class="purple" onclick="sheet()">A4 Sheet</button></div></div><div style="text-align:center"><h3>Live Preview</h3><canvas id="pc"></canvas></div></div></div></section></main><footer class="footer"><img src="rapid-job-logo-horizontal.png" alt="Rapid Job"><p>Fast Government Job Updates</p><p>© 2022 - 2026 Rapid Job</p></footer></div><script src="common.js"></script><script>let img=new Image(),loaded=false,scale=1,ox=0,oy=0,drag=false,sx=0,sy=0,c=pc,x=c.getContext('2d');function size(){let[w,h]=preset.value.split('x').map(Number);c.width=w;c.height=h;draw()}function draw(){x.fillStyle=bg.value;x.fillRect(0,0,c.width,c.height);if(!loaded){x.fillStyle='#64748b';x.font='bold 24px Arial';x.textAlign='center';x.fillText('Upload Photo',c.width/2,c.height/2);return}let r=Math.max(c.width/img.width,c.height/img.height)*scale,w=img.width*r,h=img.height*r;x.drawImage(img,(c.width-w)/2+ox,(c.height-h)/2+oy,w,h)}pfile.onchange=e=>{let f=e.target.files[0];if(!f)return;img.onload=()=>{loaded=true;scale=1;ox=oy=0;draw()};img.src=URL.createObjectURL(f)};preset.onchange=size;bg.onchange=draw;function zoom(v){scale=Math.max(.45,scale+v);draw()}function resetP(){scale=1;ox=oy=0;draw()}c.onmousedown=e=>{drag=true;sx=e.offsetX-ox;sy=e.offsetY-oy};c.onmousemove=e=>{if(drag){ox=e.offsetX-sx;oy=e.offsetY-sy;draw()}};onmouseup=()=>drag=false;function downP(){let a=document.createElement('a');a.download='rapid-job-passport.png';a.href=c.toDataURL();a.click()}function sheet(){let s=document.createElement('canvas');s.width=2480;s.height=3508;let q=s.getContext('2d');q.fillStyle='#fff';q.fillRect(0,0,s.width,s.height);let pw=420,ph=pw/(c.width/c.height),gx=160,gy=160;for(let i=0;i<20;i++){q.drawImage(c,gx,gy,pw,ph);gx+=500;if((i+1)%4===0){gx=160;gy+=ph+80}}let a=document.createElement('a');a.download='rapid-job-a4-sheet.png';a.href=s.toDataURL();a.click()}size()</script></body></html>
