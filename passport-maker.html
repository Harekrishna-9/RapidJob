<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium Passport Size Photo Maker | Rapid Job</title>
  <link rel="stylesheet" href="passport-maker.css" />
</head>
<body>
  <main class="pm-app">
    <section class="pm-hero">
      <div class="pm-badge">⚡ Rapid Job Tools</div>
      <h1>Premium Passport Size Photo Maker</h1>
      <p>Upload, crop, set background, download HD photo or print-ready A4 sheet.</p>
    </section>

    <section class="pm-panel">
      <div class="pm-controls">
        <label class="pm-upload">
          <input type="file" id="photoInput" accept="image/*" hidden />
          <span>📸 Upload Photo</span>
        </label>

        <div class="pm-group">
          <label>Photo Size</label>
          <select id="presetSelect">
            <option value="passport" selected>Passport 35 × 45 mm</option>
            <option value="india">India Passport 51 × 51 mm</option>
            <option value="aadhaar">Aadhaar/PAN 25 × 35 mm</option>
            <option value="visa">Visa 50 × 50 mm</option>
          </select>
        </div>

        <div class="pm-group">
          <label>Background</label>
          <div class="pm-colors">
            <button data-bg="#ffffff" class="active" style="background:#ffffff"></button>
            <button data-bg="#e6f4ff" style="background:#e6f4ff"></button>
            <button data-bg="#2563eb" style="background:#2563eb"></button>
            <button data-bg="#ef4444" style="background:#ef4444"></button>
            <button data-bg="#f8fafc" style="background:#f8fafc"></button>
          </div>
        </div>

        <div class="pm-actions">
          <button id="zoomOut">➖ Zoom</button>
          <button id="zoomIn">➕ Zoom</button>
          <button id="resetBtn">🔄 Reset</button>
          <button id="removeBgBtn">✨ Auto BG Clean</button>
        </div>

        <div class="pm-actions">
          <button class="download" id="downloadPhoto">⬇ Download HD</button>
          <button class="print" id="downloadSheet">🖨 A4 Sheet</button>
        </div>

        <p class="pm-note">Tip: Photo ko mouse/finger se drag karke face center me set karo. Mouse wheel se zoom bhi hoga.</p>
      </div>

      <div class="pm-stage">
        <div class="pm-frame-title">Live Crop Preview</div>
        <canvas id="photoCanvas"></canvas>
      </div>
    </section>
  </main>

  <script src="passport-maker.js"></script>
</body>
</html>
