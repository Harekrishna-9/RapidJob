<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Photo & Signature Resizer | Rapid Job</title><link rel="icon" href="favicon-32.png"><link rel="stylesheet" href="common.css"></head><body><div class="page"><header class="head"><div class="brand"><div class="logo">RJ</div><div><h1>Rapid Job</h1><p>⚡ Fast Government Job Updates!</p></div></div></header><nav class="nav"><a class="" href="index.html">Home</a><a class="" href="index.html#current">Current Job</a><a class="" href="index.html#admit">Admit Card</a><a class="" href="index.html#result">Result</a><a class="" href="index.html#admission">Admission</a><a class="active" href="tools.html">Tools</a><a class="" href="contact.html">Contact Us</a></nav><main class="main"><section class="hero"><h2>Photo & Signature Resizer</h2><p>Resize images to common online form dimensions.</p></section><section class="wrap"><div class="card"><h3>Resize Photo or Signature</h3><div class="grid2"><label>Choose Image<input type="file" id="rf" accept="image/*"></label><label>Preset<select id="rpre"><option value="200x230">Photo 200×230</option><option value="140x60">Signature 140×60</option><option value="300x400">Photo 300×400</option></select></label><label>Width<input type="number" id="rw" value="200"></label><label>Height<input type="number" id="rh" value="230"></label></div><div class="btns"><button onclick="resizeI()">Resize</button><button class="green" onclick="downR()">Download</button></div><div class="result" id="ri">Upload an image.</div><div style="text-align:center;margin-top:15px"><canvas id="rc"></canvas></div></div></section></main><footer class="footer"><img src="rapid-job-logo-horizontal.png" alt="Rapid Job"><p>Fast Government Job Updates</p><p>© 2022 - 2026 Rapid Job</p></footer></div><script src="common.js"></script><script>let im=new Image(),q=rc.getContext('2d');rpre.onchange=()=>{let[a,b]=rpre.value.split('x');rw.value=a;rh.value=b};rf.onchange=e=>{let f=e.target.files[0];if(!f)return;im.onload=()=>ri.textContent=`Original: ${im.width}×${im.height}`;im.src=URL.createObjectURL(f)};function resizeI(){if(!im.src)return;rc.width=+rw.value;rc.height=+rh.value;q.drawImage(im,0,0,rc.width,rc.height);ri.textContent=`Ready: ${rc.width}×${rc.height}`};function downR(){let a=document.createElement('a');a.download='rapid-job-resized.png';a.href=rc.toDataURL();a.click()}</script></body></html>
