<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Percentage Calculator | Rapid Job</title><link rel="icon" href="favicon-32.png"><link rel="stylesheet" href="common.css"></head><body><div class="page"><header class="head"><div class="brand"><div class="logo">RJ</div><div><h1>Rapid Job</h1><p>⚡ Fast Government Job Updates!</p></div></div></header><nav class="nav"><a class="" href="index.html">Home</a><a class="" href="index.html#current">Current Job</a><a class="" href="index.html#admit">Admit Card</a><a class="" href="index.html#result">Result</a><a class="" href="index.html#admission">Admission</a><a class="active" href="tools.html">Tools</a><a class="" href="contact.html">Contact Us</a></nav><main class="main"><section class="hero"><h2>Percentage Calculator</h2><p>Calculate marks percentage and convert CGPA.</p></section><section class="wrap"><div class="card"><h3>Marks Percentage</h3><div class="grid2"><label>Obtained Marks<input type="number" id="ob"></label><label>Total Marks<input type="number" id="to"></label></div><div class="btns"><button onclick="perc()">Calculate</button></div><div class="result" id="po">Enter marks.</div></div><div class="card"><h3>CGPA to Percentage</h3><div class="grid2"><label>CGPA<input type="number" step=".01" id="cg"></label><label>Multiplier<input type="number" step=".1" value="9.5" id="mu"></label></div><div class="btns"><button class="purple" onclick="cgpa()">Convert</button></div><div class="result" id="co">Enter CGPA.</div></div></section></main><footer class="footer"><img src="rapid-job-logo-horizontal.png" alt="Rapid Job"><p>Fast Government Job Updates</p><p>© 2022 - 2026 Rapid Job</p></footer></div><script src="common.js"></script><script>function perc(){po.innerHTML=+to.value>0?`Percentage: <b>${(+ob.value/+to.value*100).toFixed(2)}%</b>`:'Enter valid marks.'}function cgpa(){co.innerHTML=`Estimated percentage: <b>${(+cg.value*+mu.value).toFixed(2)}%</b>`}</script></body></html>
